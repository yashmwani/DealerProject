name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        run: npm run build:pages

      - name: SPA fallback for client-side routing
        run: cp dist/index.html dist/404.html

      - name: Verify production build (not dev index.html)
        run: |
          if grep -q 'src/main.tsx' dist/index.html; then
            echo "ERROR: dist/index.html still references dev source. Build failed."
            exit 1
          fi
          if ! grep -q '/DealerProject/assets/' dist/index.html; then
            echo "ERROR: dist/index.html missing correct asset paths."
            cat dist/index.html
            exit 1
          fi
          echo "Build verified OK"
          head -20 dist/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
